<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>徳源道場 体験予約 / Trial Booking</title>
<style>
  :root{
    --navy:#1a2238;
    --navy-2:#243056;
    --crimson:#ee6a1f;
    --crimson-d:#cf5a16;
    --bg:#f4f5f8;
    --card:#ffffff;
    --line:#e3e6ee;
    --text:#1c2331;
    --muted:#6b7280;
    --ok:#1f9d6b;
    --radius:14px;
    --shadow:0 10px 30px rgba(26,34,56,.08);
  }
  *{box-sizing:border-box}
  body{
    margin:0;font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--bg);color:var(--text);line-height:1.6;
  }
  .wrap{max-width:760px;margin:0 auto;padding:0 16px 64px;}
  header.topbar{
    background:linear-gradient(135deg,var(--navy),var(--navy-2));
    color:#fff;padding:18px 16px;position:sticky;top:0;z-index:20;
    box-shadow:0 2px 18px rgba(0,0,0,.18);
  }
  .topbar-inner{max-width:760px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px}
  .brand{display:flex;align-items:center;gap:12px;min-width:0}
  .brand .mark{
    width:42px;height:42px;border-radius:10px;flex:0 0 auto;
    background:var(--crimson);display:grid;place-items:center;font-weight:800;font-size:20px;
    box-shadow:inset 0 0 0 2px rgba(255,255,255,.15);
  }
  .brand .names{min-width:0}
  .brand .n1{font-weight:800;font-size:16px;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .brand .n2{font-size:11px;opacity:.8;letter-spacing:.18em;text-transform:uppercase}
  .lang{display:flex;background:rgba(255,255,255,.12);border-radius:999px;padding:3px}
  .lang button{
    border:0;background:transparent;color:#fff;opacity:.7;cursor:pointer;
    font-weight:700;font-size:13px;padding:6px 12px;border-radius:999px;transition:.15s;
  }
  .lang button.active{background:#fff;color:var(--navy);opacity:1}

  .hero{padding:30px 0 8px}
  .hero h1{font-size:26px;margin:0 0 6px;line-height:1.3}
  .hero p{margin:0;color:var(--muted)}

  .steps{display:flex;gap:8px;margin:22px 0 18px}
  .steps .s{flex:1;height:6px;border-radius:999px;background:var(--line)}
  .steps .s.done{background:var(--crimson)}
  .steplabel{font-size:12px;color:var(--muted);margin-bottom:10px;letter-spacing:.04em}

  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px;margin-bottom:16px}
  .card h2{margin:0 0 4px;font-size:19px}
  .card .sub{color:var(--muted);font-size:13px;margin:0 0 18px}

  .opt{
    display:flex;align-items:center;gap:14px;border:1.5px solid var(--line);border-radius:12px;
    padding:14px 16px;cursor:pointer;margin-bottom:10px;transition:.15s;background:#fff;
  }
  .opt:hover{border-color:#c5cbdd}
  .opt.sel{border-color:var(--crimson);background:#fff3ea;box-shadow:0 0 0 3px rgba(238,106,31,.10)}
  .opt .ic{width:44px;height:44px;border-radius:10px;background:var(--navy);color:#fff;display:grid;place-items:center;font-weight:800;flex:0 0 auto}
  .opt .t1{font-weight:700}
  .opt .t2{font-size:12.5px;color:var(--muted)}
  .opt .chev{margin-left:auto;color:#c2c8d8;font-size:20px}
  .opt .sched{color:var(--navy);font-weight:700;font-size:12px;margin-top:4px;display:flex;gap:5px;align-items:center}

  .daylist{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;margin-bottom:16px}
  .day{
    position:relative;flex:0 0 auto;width:72px;text-align:center;border:1.5px solid var(--line);border-radius:12px;
    padding:16px 0 9px;cursor:pointer;background:#fff;transition:.15s;
  }
  .day:hover{border-color:#c5cbdd}
  .day.sel{border-color:var(--crimson);background:var(--crimson);color:#fff}
  .daybadge{position:absolute;top:3px;left:0;right:0;text-align:center;color:#fff;font-size:11px;font-weight:800;line-height:1}
  .day.sel .dnum{color:#fff}
  .day .dwk{font-size:11px;color:var(--muted)}
  .day.sel .dwk{color:#ffe}
  .day .dnum{font-size:19px;font-weight:800}
  .day .dmo{font-size:11px;color:var(--muted)}
  .day.sel .dmo{color:#ffe}

  .slots{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px}
  .slot{
    border:1.5px solid var(--line);border-radius:10px;padding:12px;text-align:center;cursor:pointer;
    background:#fff;font-weight:700;transition:.15s;
  }
  .slot small{display:block;font-weight:500;color:var(--muted);font-size:11px}
  .slot:hover{border-color:#c5cbdd}
  .slot.sel{border-color:var(--crimson);background:#fff3ea;box-shadow:0 0 0 3px rgba(238,106,31,.10)}
  .slot.full{opacity:.4;cursor:not-allowed;background:#f3f4f7}
  .noslot{color:var(--muted);font-size:14px;padding:8px 0}

  label.fld{display:block;margin-bottom:14px}
  label.fld .lab{font-size:13px;font-weight:700;margin-bottom:6px;display:block}
  label.fld .req{color:var(--crimson)}
  .fld input,.fld select,.fld textarea{
    width:100%;border:1.5px solid var(--line);border-radius:10px;padding:11px 12px;font-size:15px;font-family:inherit;background:#fff;
  }
  .fld input:focus,.fld select:focus,.fld textarea:focus{outline:none;border-color:var(--navy)}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .seg{display:flex;gap:8px}
  .seg .segbtn{flex:1;border:1.5px solid var(--line);border-radius:10px;padding:11px;text-align:center;cursor:pointer;font-weight:700;background:#fff}
  .seg .segbtn.sel{border-color:var(--crimson);background:#fff3ea}

  .nav{display:flex;gap:12px;margin-top:6px}
  .btn{
    border:0;border-radius:11px;padding:13px 20px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;transition:.15s;
  }
  .btn.primary{background:var(--crimson);color:#fff;flex:1}
  .btn.primary:hover{background:var(--crimson-d)}
  .btn.primary:disabled{background:#d8aaa4;cursor:not-allowed}
  .btn.ghost{background:#eef0f5;color:var(--navy)}
  .btn.ghost:hover{background:#e3e6ef}

  .summary{background:#f8f9fc;border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:18px}
  .summary .r{display:flex;justify-content:space-between;gap:10px;padding:5px 0;font-size:14px}
  .summary .r .k{color:var(--muted)}
  .summary .r .v{font-weight:700;text-align:right}

  .done-ic{width:64px;height:64px;border-radius:50%;background:var(--ok);color:#fff;display:grid;place-items:center;margin:0 auto 14px;font-size:32px}
  .center{text-align:center}
  .preview{
    border:1px dashed #c9cee0;border-radius:12px;padding:16px;margin-top:18px;background:#fbfcff;font-size:13.5px;color:#39414f;
  }
  .preview .ph{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;display:flex;align-items:center;gap:8px}
  .preview .ph .ch{background:#e7ebf6;color:var(--navy);border-radius:6px;padding:2px 8px;font-weight:700;letter-spacing:0;text-transform:none}
  .preview pre{white-space:pre-wrap;font-family:inherit;margin:0}
  .hidden{display:none}
  .footnote{font-size:11px;color:#9aa1b1;text-align:center;margin-top:8px}

  .viewtabs{display:flex;gap:8px;margin:22px 0 0}
  .viewtabs button{
    flex:1;border:1.5px solid var(--line);background:#fff;border-radius:10px;padding:10px;
    font-weight:800;font-size:14px;cursor:pointer;color:var(--muted);font-family:inherit;transition:.15s;
  }
  .viewtabs button.active{background:var(--navy);color:#fff;border-color:var(--navy)}

  table.adm{width:100%;border-collapse:collapse;font-size:13.5px}
  table.adm th,table.adm td{text-align:left;padding:11px 10px;border-bottom:1px solid var(--line);vertical-align:top}
  table.adm th{font-size:11px;letter-spacing:.04em;color:var(--muted);text-transform:uppercase;font-weight:700}
  table.adm td .who{font-weight:700}
  table.adm td .small{color:var(--muted);font-size:12px}
  .badge{display:inline-block;padding:3px 9px;border-radius:999px;font-size:11.5px;font-weight:800}
  .badge.booked{background:#fdeee6;color:#b15a1f}
  .badge.requested{background:#fff4d6;color:#9a6700}
  .badge.confirmed{background:#e6f5ee;color:#1f7a4d}
  .badge.rejected{background:#fdecec;color:#b3261e}
  .badge.cancelled{background:#f0f1f4;color:#8a90a0}
  .reason{font-size:12px;color:#b3261e;margin-top:4px}
  .msgrow td{background:#fbfcff}
  .msgbox{border:1px dashed #c9cee0;border-radius:10px;padding:12px;background:#fff;font-size:13px;color:#39414f}
  .msgbox .mh{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
  .msgbox pre{white-space:pre-wrap;font-family:inherit;margin:0}
  .leadnote{font-size:12px;color:var(--muted);margin:0 0 12px}
  .actbtn{border:0;border-radius:8px;padding:6px 10px;font-size:12px;font-weight:800;cursor:pointer;margin:2px 4px 2px 0;font-family:inherit}
  .actbtn.ok{background:var(--ok);color:#fff}
  .actbtn.no{background:#eef0f5;color:var(--navy)}
  .admscroll{overflow-x:auto}
  .admempty{text-align:center;color:var(--muted);padding:34px 0}
  .admbar{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:6px;flex-wrap:wrap}
  .admbar .cnt{font-size:12.5px;color:var(--muted)}
  .linkbtn{background:none;border:0;color:var(--crimson);font-weight:700;cursor:pointer;font-size:12.5px;font-family:inherit}
  .tenant-tip{font-size:11.5px;color:#9aa1b1;text-align:center;margin-top:18px}
</style>
</head>
<body>
<header class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <div class="mark" id="brandMark">徳</div>
      <div class="names">
        <div class="n1" id="brandName">徳源道場</div>
        <div class="n2">Karate in English</div>
      </div>
    </div>
    <div class="lang">
      <button id="btnJa" class="active" onclick="setLang('ja')">日本語</button>
      <button id="btnEn" onclick="setLang('en')">EN</button>
    </div>
  </div>
</header>

<div class="wrap">
  <div class="viewtabs">
    <button id="tabBook" class="active" onclick="setView('book')"></button>
    <button id="tabAdmin" onclick="setView('admin')"></button>
  </div>

  <div id="bookingView">
  <div class="hero">
    <h1 id="heroTitle"></h1>
    <p id="heroSub"></p>
  </div>

  <div class="steps">
    <div class="s" id="bar0"></div>
    <div class="s" id="bar1"></div>
    <div class="s" id="bar2"></div>
    <div class="s" id="bar3"></div>
  </div>
  <div class="steplabel" id="stepLabel"></div>

  <!-- STEP 0: class -->
  <section class="card" id="step0">
    <h2 id="s0h"></h2>
    <p class="sub" id="s0sub"></p>
    <div id="visitType" class="seg" style="margin-bottom:18px"></div>
    <div id="classList"></div>
    <div class="nav">
      <button class="btn primary" id="next0" disabled onclick="go(1)"></button>
    </div>
  </section>

  <!-- STEP 1: date/time -->
  <section class="card hidden" id="step1">
    <h2 id="s1h"></h2>
    <p class="sub" id="s1sub"></p>
    <div class="leadnote" id="leadNote"></div>
    <div class="daylist" id="dayList"></div>
    <div id="slotArea"></div>
    <div class="footnote" id="pickInfo" style="text-align:left;margin-top:8px;color:var(--crimson);font-weight:700"></div>
    <div class="footnote" id="oneGroup" style="text-align:left;margin-top:6px"></div>
    <div class="nav">
      <button class="btn ghost" onclick="go(0)" id="back1"></button>
      <button class="btn primary" id="next1" disabled onclick="go(2)"></button>
    </div>
  </section>

  <!-- STEP 2: details -->
  <section class="card hidden" id="step2">
    <h2 id="s2h"></h2>
    <p class="sub" id="s2sub"></p>
    <div class="summary" id="sum2"></div>
    <div class="row2">
      <label class="fld"><span class="lab" id="lPart"></span><span class="req">*</span>
        <input id="fPart" type="text" />
      </label>
      <label class="fld"><span class="lab" id="lAge"></span><span class="req">*</span>
        <input id="fAge" type="number" min="3" max="99" />
      </label>
    </div>
    <label class="fld"><span class="lab" id="lGuardian"></span>
      <input id="fGuardian" type="text" />
    </label>
    <div class="row2">
      <label class="fld"><span class="lab" id="lPhone"></span><span class="req">*</span>
        <input id="fPhone" type="tel" />
      </label>
      <label class="fld"><span class="lab" id="lEmail"></span><span class="req">*</span>
        <input id="fEmail" type="email" />
      </label>
    </div>
    <label class="fld"><span class="lab" id="lExp"></span>
      <select id="fExp"></select>
    </label>
    <label class="fld"><span class="lab" id="lNote"></span>
      <textarea id="fNote" rows="2"></textarea>
    </label>
    <div class="nav">
      <button class="btn ghost" onclick="go(1)" id="back2"></button>
      <button class="btn primary" id="submitBtn" onclick="go(3)"></button>
    </div>
    <div class="footnote" id="privacy"></div>
  </section>

  <!-- STEP 3: confirmation -->
  <section class="card hidden center" id="step3">
    <div class="done-ic">✓</div>
    <h2 id="s3h"></h2>
    <p class="sub" id="s3sub" style="margin-bottom:0"></p>
    <div class="summary" id="sum3" style="text-align:left;margin-top:18px"></div>
    <!-- 自動送信メッセージのプレビュー：申込者には非表示（道場の確認用）。実運用では客にはメール/LINEが届くのみ。 -->
    <div class="preview hidden" style="text-align:left">
      <div class="ph"><span class="ch" id="chMail">✉ Email</span><span id="previewLabel"></span></div>
      <pre id="mailPreview"></pre>
    </div>
    <div class="preview hidden" style="text-align:left">
      <div class="ph"><span class="ch" id="chLine">LINE</span><span id="lineLabel"></span></div>
      <pre id="linePreview"></pre>
    </div>
    <div class="preview" style="text-align:left">
      <div class="ph"><span class="ch">▶</span><span id="nextTitle"></span></div>
      <ol id="nextSteps" style="margin:6px 0 0;padding-left:20px"></ol>
    </div>
    <div class="preview" style="text-align:left">
      <div class="ph"><span class="ch">¥</span><span id="feesTitle"></span></div>
      <div class="summary" id="feesBox" style="margin:6px 0 8px;background:#fff"></div>
      <div class="footnote" id="feesNote" style="text-align:left;margin:0"></div>
    </div>
    <div class="nav" style="margin-top:18px">
      <button class="btn ghost" onclick="restart()" id="restartBtn" style="flex:1"></button>
    </div>
  </section>

  <div class="tenant-tip" id="tenantTip"></div>
  </div><!-- /bookingView -->

  <!-- ADMIN VIEW -->
  <section id="adminView" class="hidden">
    <div class="hero">
      <h1 id="admTitle"></h1>
      <p id="admSub"></p>
    </div>
    <div class="card">
      <div class="admbar">
        <span class="cnt" id="admCount"></span>
        <button class="linkbtn" id="admSeed" onclick="seedDemo()"></button>
      </div>
      <div class="admscroll">
        <table class="adm">
          <thead><tr>
            <th id="colDate"></th><th id="colClass"></th><th id="colName"></th>
            <th id="colContact"></th><th id="colStatus"></th><th id="colAction"></th>
          </tr></thead>
          <tbody id="admBody"></tbody>
        </table>
      </div>
      <div class="admempty hidden" id="admEmpty"></div>
    </div>
  </section>
</div>

<script>
/* ============================================================
   TENANT CONFIG — マルチテナント対応の中核。
   他道場へ販売する際は、このオブジェクトをテナントごとに差し替える。
   ============================================================ */

/* ============================ i18n ============================ */
const I18N = {
  ja:{

/* ===================== STORAGE (prototype) ===================== */
const STORE_KEY = "tokugen_bookings_v1";
function loadBookings(){ try{ return JSON.parse(localStorage.getItem(STORE_KEY)||"[]"); }catch(e){ return []; } }
function saveBookings(arr){ try{ localStorage.setItem(STORE_KEY, JSON.stringify(arr)); }catch(e){} }
function addBooking(b){ const a=loadBookings(); a.push(b); saveBookings(a); }
function updateBooking(id,patch){ const a=loadBookings().map(b=>b.id===id?Object.assign(b,patch):b); saveBookings(a); }
// 予約が押さえているスロット：申請中=候補すべて、確定=確定した1つ
function occupiedSlots(b){
  if(b.status==="requested") return b.picks||[];
  if(b.status==="confirmed") return b.confirmed?[b.confirmed]:[];
  return [];
}
// 同じクラス・日付・開始時刻を押さえる有効予約があるか（1組制約）。却下/キャンセルは枠を解放。
function slotTaken(classId,date,start){
  return loadBookings().some(b=>b.classId===classId
    && occupiedSlots(b).some(p=>p.date===date&&p.start===start));
}

const wkJa=["日","月","火","水","木","金","土"], wkEn=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const moEn=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

/* deterministic pseudo-random so "full" slots are stable per render */
function seeded(n){ let x=Math.sin(n)*10000; return x-Math.floor(x); }

function selectedClass(){ return TENANT.classes.find(c=>c.id===state.classId)||null; }

// ローカル日付を YYYY-MM-DD に（toISOStringはUTC変換で日付がズレるため使わない）
function ymd(d){ const p=n=>String(n).padStart(2,"0"); return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`; }

// クラスの開講スケジュールを人間可読に（例：水・金 16:30–17:15 / 土 10:15–11:00）
function scheduleText(cls){
  const wk = lang==="ja"?wkJa:wkEn;
  const sep = lang==="ja"?"・":"·";
  const groups={};
  cls.sessions.forEach(s=>{ const k=`${s.start}–${s.end}`; (groups[k]=groups[k]||[]).push(s.dow); });
  return Object.entries(groups).map(([time,dows])=>dows.map(d=>wk[d]).join(sep)+" "+time).join(" / ");
}

// 選択中クラスが開講する今後の日付（最大10件）
function buildDays(){
  const cls=selectedClass(); if(!cls) return [];
  const dows=new Set(cls.sessions.map(s=>s.dow));
  const days=[]; const today=new Date(); today.setHours(0,0,0,0);
  const lead=TENANT.leadDays||0;  // 当日・前日は不可
  for(let i=lead;i<=42 && days.length<10;i++){
    const d=new Date(today); d.setDate(today.getDate()+i);
    if(dows.has(d.getDay())) days.push(d);
  }
  return days;
}
// その日の、選択中クラスのセッション（1組のみ）
function slotsFor(date){
  const cls=selectedClass(); if(!cls) return [];
  const key=ymd(date);
  return cls.sessions.filter(s=>s.dow===date.getDay()).map(s=>{
    const seed=date.getDate()*100+parseInt(s.start.replace(":",""),10);
    const taken=slotTaken(cls.id,key,s.start);
    return { time:s.start, range:`${s.start}–${s.end}`, full: taken || seeded(seed)<0.25 };
  });
}

function fmtDay(d){
  return lang==="ja"
    ? {wk:wkJa[d.getDay()], num:d.getDate(), mo:(d.getMonth()+1)+"月"}
    : {wk:wkEn[d.getDay()], num:d.getDate(), mo:moEn[d.getMonth()]};
}
function fmtDateFull(d,time){
  if(lang==="ja") return `${d.getMonth()+1}月${d.getDate()}日(${wkJa[d.getDay()]}) ${time}`;
  return `${wkEn[d.getDay()]}, ${moEn[d.getMonth()]} ${d.getDate()} · ${time}`;
}
// 候補スロット {date,start,range} を表示文字列に
function pickWhen(p){ return fmtDateFull(new Date(p.date+"T00:00:00"), p.range||p.start); }
function candLabel(i){ return lang==="ja" ? (i===0?"第1希望":"第2希望") : ("Option "+(i+1)); }
function hasPick(date,start){ return state.picks.some(p=>p.date===date&&p.start===start); }
function togglePick(date,start,range){
  const i=state.picks.findIndex(p=>p.date===date&&p.start===start);
  if(i>=0){ state.picks.splice(i,1); }
  else { if(state.picks.length>=2) return; state.picks.push({date,start,range}); }
  renderDays(); renderSlots(); checkNext1();   // 日付チップのバッジも更新
}

function renderDays(){
  const box=document.getElementById("dayList"); box.innerHTML="";
  buildDays().forEach(d=>{
    const f=fmtDay(d); const key=ymd(d);
    const pickIdx=state.picks.findIndex(p=>p.date===key); // この日に候補があるか
    const el=document.createElement("div");
    // 現在見ている日、または候補に入っている日を赤くする
    el.className="day"+((state.date===key||pickIdx>=0)?" sel":"");
    const badge=pickIdx>=0?`<div class="daybadge">${pickIdx+1}</div>`:"";
    el.innerHTML=`${badge}<div class="dwk">${f.wk}</div><div class="dnum">${f.num}</div><div class="dmo">${f.mo}</div>`;
    el.onclick=()=>{state.date=key; renderDays(); renderSlots(); checkNext1();};
    box.appendChild(el);
  });
}

function renderSlots(){
  const area=document.getElementById("slotArea"); area.innerHTML="";
  if(!state.date){ area.innerHTML=`<div class="noslot">${lang==="ja"?"日付を選んでください。":"Please select a date."}</div>`; return; }
  const d=new Date(state.date+"T00:00:00");
  const slots=slotsFor(d);
  if(slots.length===0){ area.innerHTML=`<div class="noslot">${t("noslot")}</div>`; return; }
  const grid=document.createElement("div"); grid.className="slots";
  slots.forEach(s=>{
    const el=document.createElement("div");
    const sel=hasPick(state.date,s.time);
    const atMax=state.picks.length>=2 && !sel;
    el.className="slot"+(s.full?" full":"")+(sel?" sel":"")+(atMax?" full":"");
    el.innerHTML=`${s.range}<small>${s.full?t("full"):(sel?(lang==="ja"?"選択中":"Selected"):(lang==="ja"?"受付可":"Open"))}</small>`;
    if(!s.full && !atMax) el.onclick=()=>togglePick(state.date, s.time, s.range);
    grid.appendChild(el);
  });
  area.appendChild(grid);
  renderPickInfo();
}
function renderPickInfo(){
  const el=document.getElementById("pickInfo"); if(!el) return;
  if(state.picks.length===0){
    el.textContent = lang==="ja" ? "希望日は2つまで選べます（別の日からもう1つ選べます）。" : "You can pick up to 2 options (choose a second from another day).";
    el.style.color="var(--muted)"; el.style.fontWeight="500"; return;
  }
  el.style.color="var(--crimson)"; el.style.fontWeight="700";
  const list=state.picks.map((p,i)=>candLabel(i)+"："+pickWhen(p)).join(" ／ ");
  let txt=(lang==="ja"?`選択中 ${state.picks.length}/2 ｜ `:`Selected ${state.picks.length}/2 | `)+list;
  if(state.picks.length===1) txt += lang==="ja" ? "　← 別の日からもう1つ選べます" : "  ← pick a 2nd from another day";
  el.textContent=txt;
}

function updateStepLabel(){ /* set in go() */ }

/* ============================ NAV ============================ */
function go(step){
  // validation
  if(step===1){ renderDays(); renderSlots(); renderPickInfo(); checkNext1(); }
  if(step===2){ renderSummary("sum2"); }
  if(step===3){
    const reqs=["fPart","fAge","fPhone","fEmail"];
    for(const id of reqs){ const el=document.getElementById(id); if(!el.value.trim()){ el.focus(); el.style.borderColor="#c0392b"; return; } }
    persistBooking();
    buildConfirmation();
  }
  ["step0","step1","step2","step3"].forEach((s,i)=>document.getElementById(s).classList.toggle("hidden",i!==step));
  for(let i=0;i<4;i++) document.getElementById("bar"+i).classList.toggle("done",i<=step);
  document.getElementById("stepLabel").textContent=I18N[lang].steplabels[step];
  window.scrollTo({top:0,behavior:"smooth"});
}

    if(kind==="confirm") return {
      mail:`Subject: [${dojo}] Your trial is confirmed\n\nDear ${name},\n\nYour trial is confirmed — we look forward to meeting you.\n\n▼ Confirmed\nClass: ${cls}\nWhen: ${when}\n\n《Access》\n${addr}\nNo need to ring the intercom — just open the door and come in.\n\n《On the day》Please arrive ${arr} minutes early for a short briefing.\n《Clothing》Comfortable clothes (no zippers). We train barefoot.\n《Bring》A drink and a towel. No gi needed.\n\nReply to this email with any questions.\n\n${dojo}`,
      line:`Hi ${name}, your trial is confirmed 🥋\n${when} · ${cls}\nArrive ${arr} min early. Address: ${addr}\nSee you there!` };
    if(kind==="cancel") return {
      mail:`Subject: [${dojo}] Your trial has been cancelled\n\nDear ${name},\n\nWe're very sorry — we have to cancel your confirmed trial (${cls}, ${when}) due to a change on our side.\n\nReason: ${b.reason||"—"}\n\nApologies for the inconvenience. We'd be glad to rebook you on another date. Reply here with any questions.\n\n${dojo}`,
      line:`Hi ${name}, we're sorry — your confirmed trial (${when}, ${cls}) is cancelled.\nReason: ${b.reason||"—"}\nWe'd be happy to rebook you 🙏` };
    return {
      mail:`Subject: [${dojo}] About your trial date\n\nDear ${name},\n\nThank you for your request. Unfortunately none of your requested options (${cls}) are available:\n${cands}\n\nReason: ${b.reason||"—"}\n\nCould you pick another open slot? Reply here with any questions.\n\n${dojo}`,
      line:`Hi ${name}, sorry we can't do your requested time.\nReason: ${b.reason||"—"}\nCould you choose another slot? 🙏` };
  }
}

function buildConfirmation(){
  renderSummary("sum3");
  const b=loadBookings().find(x=>x.id===state.bookingId);
  if(!b) return;
  const m=messageFor(b,"request");
  document.getElementById("mailPreview").textContent=m.mail;
  document.getElementById("linePreview").textContent=m.line;
}

function persistBooking(){
  if(state.bookingId) return; // 二重登録防止
  const g=id=>{const el=document.getElementById(id);return el?el.value.trim():"";};
  const b={
    id:"b"+Date.now()+Math.floor(Math.random()*1000),
    ts:Date.now(), visit:state.visit, classId:state.classId,
    picks:state.picks.map(p=>({date:p.date,start:p.start,range:p.range})),
    part:g("fPart"), age:g("fAge"), guardian:g("fGuardian"),
    phone:g("fPhone"), email:g("fEmail"),
    exp:document.getElementById("fExp").selectedIndex, note:g("fNote"),
    status:"requested", reason:"", confirmed:null
  };
  state.bookingId=b.id; addBooking(b);
}

function restart(){ state={visit:"trial",classId:null,date:null,picks:[],bookingId:null};
  ["fPart","fAge","fGuardian","fPhone","fEmail","fNote"].forEach(id=>document.getElementById(id).value="");
  renderAll(); go(0);
}

/* ============================ VIEW SWITCH ============================ */
function setView(v){
  view=v;
  document.getElementById("tabBook").classList.toggle("active",v==="book");
  document.getElementById("tabAdmin").classList.toggle("active",v==="admin");
  document.getElementById("bookingView").classList.toggle("hidden",v!=="book");
  document.getElementById("adminView").classList.toggle("hidden",v!=="admin");
  if(v==="admin") adminRender();
  window.scrollTo({top:0,behavior:"smooth"});
}

/* ============================ ADMIN ============================ */
function adminFmtDate(b){
  if(b.confirmed) return `<span class="who">${pickWhen(b.confirmed)}</span>`;
  const ps=b.picks||[];
  return ps.map((p,i)=>(ps.length>1?`<span class="small">${candLabel(i)}</span> `:"")+pickWhen(p)).join("<br>");
}
function classNameById(id){ const c=TENANT.classes.find(x=>x.id===id); return c?c.name[lang]:id; }
function visitLabel(v){ return v==="trial"?t("visitTrial"):t("visitWatch"); }

function statusBadge(b){
  const map={requested:"stRequested",confirmed:"stConfirmed",rejected:"stRejected",cancelled:"stCancelled",booked:"stBooked"};
  return `<span class="badge ${b.status}">${t(map[b.status]||"stRequested")}</span>`;
}
function msgKindFor(status){ return status==="confirmed"?"confirm":status==="rejected"?"reject":status==="cancelled"?"cancel":"request"; }

function adminRender(){
  document.getElementById("admTitle").textContent=t("admTitle");
  document.getElementById("admSub").textContent=t("admSub");
  ["colDate","colClass","colName","colContact","colStatus","colAction"].forEach(c=>document.getElementById(c).textContent=t(c));
  document.getElementById("admSeed").textContent="＋ "+t("seedDemo");
  const rows=loadBookings().slice().sort((a,b)=>b.ts-a.ts);
  const body=document.getElementById("admBody"); body.innerHTML="";
  const empty=document.getElementById("admEmpty");
  const active=rows.filter(r=>r.status==="requested"||r.status==="confirmed").length;
  document.getElementById("admCount").textContent=active+" "+t("admCount");
  if(rows.length===0){ empty.textContent=t("admEmpty"); empty.classList.remove("hidden"); return; }
  empty.classList.add("hidden");
  rows.forEach(b=>{
    const tr=document.createElement("tr");
    let actions="";
    if(b.status==="requested"){
      const ps=b.picks||[];
      if(ps.length>1){
        actions=ps.map((p,i)=>`<button class="actbtn ok" onclick="confirmBooking('${b.id}',${i})">${t("actConfirm")} ${["①","②"][i]||(i+1)}</button>`).join("");
      }else{
        actions=`<button class="actbtn ok" onclick="confirmBooking('${b.id}',0)">${t("actConfirm")}</button>`;
      }
      actions+=`<button class="actbtn no" onclick="rejectBooking('${b.id}')">${t("actReject")}</button>`;
    }else if(b.status==="confirmed"){
      actions=`<button class="actbtn no" onclick="cancelBooking('${b.id}')">${t("actCancel")}</button>`;
    }else{ // rejected / cancelled / 旧booked
      actions=`<button class="actbtn no" onclick="setStatus('${b.id}','requested')">${t("actRestore")}</button>`;
    }
    actions+=`<button class="actbtn no" onclick="toggleMsg('${b.id}')">✉ ${t("msgShow")}</button>`;
    const reasonHtml=((b.status==="rejected"||b.status==="cancelled")&&b.reason)?`<div class="reason">${esc(b.reason)}</div>`:"";
    tr.innerHTML=
      `<td>${adminFmtDate(b)}</td>`+
      `<td>${classNameById(b.classId)}<div class="small">${visitLabel(b.visit)}</div></td>`+
      `<td><span class="who">${esc(b.part)||"-"}</span><div class="small">${b.age?(b.age+(lang==="ja"?"歳":"y")):""}${b.guardian?" / "+esc(b.guardian):""}</div></td>`+
      `<td class="small">${esc(b.phone)}<br>${esc(b.email)}</td>`+
      `<td>${statusBadge(b)}${reasonHtml}</td>`+
      `<td>${actions}</td>`;
    body.appendChild(tr);
    // 却下/取消の理由入力（画面内インライン）
    if(pendingReason && pendingReason.id===b.id){
      const labelKey=pendingReason.action==="reject"?"reasonPrompt":"cancelPrompt";
      const rr=document.createElement("tr"); rr.className="msgrow";
      rr.innerHTML=`<td colspan="6"><div class="msgbox"><div class="mh">${t(labelKey)}</div>`+
        `<textarea id="reasonInput" rows="2" style="width:100%;border:1.5px solid var(--line);border-radius:8px;padding:8px;font-family:inherit;font-size:13px;box-sizing:border-box"></textarea>`+
        `<div style="margin-top:8px"><button class="actbtn ok" onclick="submitReason()">${t("reasonSend")}</button>`+
        `<button class="actbtn no" onclick="cancelReason()">${t("reasonAbort")}</button></div></div></td>`;
      body.appendChild(rr);
    }
    // 送信文面（道場確認用・初期は非表示）
    const kind=msgKindFor(b.status); const m=messageFor(b,kind);
    const titleKey=kind==="confirm"?"msgConfTitle":kind==="reject"?"msgRejTitle":kind==="cancel"?"msgCancTitle":"msgReqTitle";
    const mr=document.createElement("tr"); mr.className="msgrow hidden"; mr.id="msg-"+b.id;
    mr.innerHTML=`<td colspan="6"><div class="msgbox"><div class="mh">✉ ${t(titleKey)}</div><pre>${esc(m.mail)}</pre><div class="mh" style="margin-top:10px">LINE</div><pre>${esc(m.line)}</pre></div></td>`;
    body.appendChild(mr);
  });
}
function setStatus(id,st){ updateBooking(id,{status:st}); adminRender(); }
function confirmBooking(id,idx){
  const b=loadBookings().find(x=>x.id===id); if(!b) return;
  const pick=(b.picks||[])[idx||0]; if(!pick) return;
  updateBooking(id,{status:"confirmed", confirmed:pick});
  adminRender();
}
// 却下/取消は画面内の理由入力で行う（サンドボックスiframeではwindow.promptが無効なため）
let pendingReason=null; // {id, action:'reject'|'cancel'}
function rejectBooking(id){ askReason(id,"reject"); }
function cancelBooking(id){ askReason(id,"cancel"); }
function askReason(id,action){ pendingReason={id,action}; adminRender();
  setTimeout(()=>{const ta=document.getElementById("reasonInput"); if(ta) ta.focus();},0); }
function cancelReason(){ pendingReason=null; adminRender(); }
function submitReason(){
  if(!pendingReason) return;
  const ta=document.getElementById("reasonInput");
  const reason=ta?ta.value.trim():"";
  updateBooking(pendingReason.id,{status: pendingReason.action==="reject"?"rejected":"cancelled", reason});
  pendingReason=null; adminRender();
}
function toggleMsg(id){ const el=document.getElementById("msg-"+id); if(el) el.classList.toggle("hidden"); }
function esc(s){ return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

// デモ用：次の開講枠にサンプル予約を1件入れる
function seedDemo(){
  const samples=[
    {classId:"k1",part:"田中 太郎",age:"6",guardian:"田中 花子",phone:"090-1111-2222",email:"taro@example.com"},
    {classId:"k2",part:"Emma Smith",age:"10",guardian:"John Smith",phone:"080-3333-4444",email:"emma@example.com"},
    {classId:"k3",part:"佐藤 健",age:"28",guardian:"",phone:"070-5555-6666",email:"ken@example.com"}
  ];
  const s=samples[loadBookings().length%samples.length];
  const cls=TENANT.classes.find(c=>c.id===s.classId);
  // 次の開講日を探す
  const today=new Date(); today.setHours(0,0,0,0);
  const picks=[];
  for(let i=(TENANT.leadDays||0);i<=60&&picks.length<2;i++){ const d=new Date(today); d.setDate(today.getDate()+i);
    const m=cls.sessions.find(x=>x.dow===d.getDay()&&!slotTaken(cls.id,ymd(d),x.start)&&!picks.some(p=>p.date===ymd(d)&&p.start===x.start));
    if(m) picks.push({date:ymd(d),start:m.start,range:`${m.start}–${m.end}`});
  }
  if(picks.length===0){ return; }
  addBooking({ id:"b"+Date.now()+Math.floor(Math.random()*1000), ts:Date.now(),
    visit:"trial", classId:s.classId, picks,
    part:s.part, age:s.age, guardian:s.guardian, phone:s.phone, email:s.email,
    exp:0, note:"", status:"requested", reason:"", confirmed:null });
  adminRender();
}

/* init */
renderAll(); go(0); setView("book");
</script>
